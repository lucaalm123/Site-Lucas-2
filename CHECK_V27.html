<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHECK V27</title>
<link rel="stylesheet" href="assets/css/v27.css">
<style>
.check{position:relative;z-index:5;padding:120px var(--pad);min-height:160vh}
.box{max-width:980px;padding:28px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(0,0,0,.52);backdrop-filter:blur(14px)}
pre{white-space:pre-wrap}
.demo-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
</style>
</head>
<body>
<canvas id="nimo-native-fluid-canvas" class="nimo-native-fluid-canvas nimo-global-fluid-canvas" aria-hidden="true"></canvas>
<div class="site">
  <div class="check">
    <div class="box">
      <p class="kicker">CHECK V27</p>
      <h1 class="h2 fill-text">Agora a fumaça precisa aparecer de verdade.</h1>
      <p class="lead">Mova o mouse pela tela. A aurora colorida deve ficar claramente visível. Pressione a tecla <strong>A</strong> para alternar o modo ultra forte.</p>
      <div class="demo-row">
        <a class="btn primary" href="#">Botão colorido</a>
        <a class="btn" href="#">Hover colorido</a>
      </div>
      <pre id="status">verificando...</pre>
    </div>
  </div>
</div>
<script src="assets/js/nimo-native-fluid.js" defer></script>
<script src="assets/js/v27.js" defer></script>
<script>
Promise.all([
fetch("assets/css/v27.css",{cache:"no-store"}).then(r=>["v27.css",r.ok]),
fetch("assets/js/v27.js",{cache:"no-store"}).then(r=>["v27.js",r.ok]),
fetch("assets/js/nimo-native-fluid.js",{cache:"no-store"}).then(r=>["nimo-native-fluid.js",r.ok]),
fetch("index.html",{cache:"no-store"}).then(r=>["index.html",r.ok])
]).then(res=>status.textContent=res.map(([n,ok])=>`${ok?"OK":"ERRO"} — ${n}`).join("\n"));
</script>
</body>
</html>
