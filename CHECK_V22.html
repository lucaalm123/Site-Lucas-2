<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHECK V22</title>
<link rel="stylesheet" href="assets/css/v22.css">
<style>.check{position:relative;z-index:5;padding:130px var(--pad);min-height:150vh}.box{max-width:860px;padding:28px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(0,0,0,.52)}pre{white-space:pre-wrap}</style>
</head>
<body>
<canvas id="nimo-native-fluid-canvas" class="nimo-native-fluid-canvas nimo-global-fluid-canvas" aria-hidden="true"></canvas>
<div class="check"><div class="box"><p class="kicker">CHECK V22</p><h1 class="h2" data-letter-fx>Teste global do efeito Nimo + layout V22.</h1><p class="lead">Mova o mouse: a fumaça precisa ficar mais viva, colorida e aparecer no site inteiro. Console esperado: [V22] Full Nimo rebuild OK e [V22] Nimo native webgl-fluid global vivid OK.</p><pre id="status">verificando...</pre></div></div>
<script src="assets/js/nimo-native-fluid.js" defer></script>
<script src="assets/js/v22.js" defer></script>
<script>
Promise.all([
fetch("assets/css/v22.css",{cache:"no-store"}).then(r=>["v22.css",r.ok]),
fetch("assets/js/v22.js",{cache:"no-store"}).then(r=>["v22.js",r.ok]),
fetch("assets/js/nimo-native-fluid.js",{cache:"no-store"}).then(r=>["nimo-native-fluid.js",r.ok]),
fetch("assets/generated/testimonial-01.svg",{cache:"no-store"}).then(r=>["testimonial-01.svg",r.ok]),
fetch("assets/portfolio/contratos.png",{cache:"no-store"}).then(r=>["contratos.png",r.ok])
]).then(res=>status.textContent=res.map(([n,ok])=>`${ok?"OK":"ERRO"} — ${n}`).join("\n"));
</script>
</body>
</html>
