<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHECK V20 — Nimo Native Fluid</title>
<link rel="stylesheet" href="assets/css/01-tokens.css">
<link rel="stylesheet" href="assets/css/02-base.css">
<link rel="stylesheet" href="assets/css/03-layout.css">
<link rel="stylesheet" href="assets/css/04-components.css">
<link rel="stylesheet" href="assets/css/05-sections.css">
<link rel="stylesheet" href="assets/css/06-effects.css">
<link rel="stylesheet" href="assets/css/07-responsive.css">
<style>
body{margin:0;background:#000;color:#fff;font-family:var(--font-body);min-height:140vh}
.test-hero{position:relative;min-height:100svh;overflow:hidden;display:grid;align-items:center;padding:120px var(--pad);isolation:isolate;background:#000}
.test-hero canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.95;mix-blend-mode:screen}
.test-content{position:relative;z-index:2;max-width:900px}
.status{position:fixed;right:18px;bottom:18px;z-index:999;border-radius:999px;padding:12px 16px;background:var(--lime);color:var(--ink);font-family:var(--font-mono);font-weight:900}
pre{white-space:pre-wrap;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;margin-top:28px}
</style>
</head>
<body>
<section class="test-hero">
  <canvas id="nimo-native-fluid-canvas" class="nimo-native-fluid-canvas" aria-hidden="true"></canvas>
  <div class="test-content">
    <p class="kicker">{{ V20 }} Nimo Native Fluid</p>
    <h1 class="h2">Este teste usa a própria lógica webgl-fluid do arquivo do Nimo. Mova o mouse sobre a tela.</h1>
    <p class="lead">O resultado esperado é fluido real com splat/rastro, não glow genérico.</p>
    <pre id="status">Verificando arquivos...</pre>
  </div>
</section>
<div class="status">CHECK V20</div>
<script src="assets/js/nimo-native-fluid.js" defer></script>
<script>
Promise.all([
  fetch("assets/js/nimo-native-fluid.js",{cache:"no-store"}).then(r=>["nimo-native-fluid.js",r.ok]),
  fetch("assets/css/05-sections.css",{cache:"no-store"}).then(r=>["05-sections.css",r.ok]),
  fetch("index.html",{cache:"no-store"}).then(r=>["index.html",r.ok])
]).then(results=>{
  document.getElementById("status").textContent = results.map(([name,ok]) => `${ok ? "OK" : "ERRO"} — ${name}`).join("\n");
});
</script>
</body>
</html>
