<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHECK V13 — Motion Real</title>
<style>
body{background:#050505;color:#fffaf0;font-family:Arial,sans-serif;padding:28px}
.ok{color:#d9ff2f}.err{color:#ff6b6b}code{color:#d9ff2f}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card{border:1px solid #333;border-radius:18px;padding:14px;background:#111}
img{width:100%;height:180px;object-fit:contain}
</style>
</head>
<body>
<h1>CHECK V13 — Motion Real</h1>
<p>Confirme se CSS, JS e imagens estão OK.</p>
<div id="status"></div>
<div class="grid" id="imgs"></div>
<script>
const files=["index.html","assets/css/05-sections.css","assets/css/06-effects.css","assets/js/effects.js","assets/js/main.js","assets/portfolio/contratos.png","assets/portfolio/procon.png","assets/portfolio/ticket.png","assets/portfolio/obramax.png","assets/portfolio/impugnacao.png"];
Promise.all(files.map(f=>fetch(f,{cache:"no-store"}).then(r=>[f,r.ok]).catch(()=>[f,false]))).then(results=>{
  status.innerHTML=results.map(([f,ok])=>`<p class="${ok?'ok':'err'}">${ok?'OK':'ERRO'} — <code>${f}</code></p>`).join("");
});
["contratos.png","procon.png","ticket.png","obramax.png","impugnacao.png"].forEach(n=>{
  const d=document.createElement("div");d.className="card";d.innerHTML=`<img src="assets/portfolio/${n}" alt="${n}"><p><code>${n}</code></p>`;imgs.appendChild(d);
});
</script>
</body>
</html>
