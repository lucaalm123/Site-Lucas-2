<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHECK V26</title>
<link rel="stylesheet" href="assets/css/v26.css">
<style>.check{position:relative;z-index:5;padding:130px var(--pad);min-height:150vh}.box{max-width:980px;padding:28px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(0,0,0,.62)}pre{white-space:pre-wrap}</style>
</head>
<body>
<canvas id="nimo-native-fluid-canvas" class="nimo-native-fluid-canvas nimo-global-fluid-canvas" aria-hidden="true"></canvas>
<div class="site">
  <div class="check">
    <div class="box">
      <p class="kicker">CHECK V26</p>
      <h1 class="h2 fill-text">Fumaça mais saturada e acentos coloridos no site.</h1>
      <p class="lead">Mova bastante o mouse. O efeito deve ficar mais vivo, com cores mais fortes, e alguns botões/palavras devem receber o gradiente do próprio efeito.</p>
      <a class="btn primary" href="#">Botão colorido</a>
      <pre id="status">verificando...</pre>
    </div>
  </div>
</div>
<script src="assets/js/nimo-native-fluid.js" defer></script>
<script src="assets/js/v26.js" defer></script>
<script>
Promise.all([
fetch("assets/css/v26.css",{cache:"no-store"}).then(r=>["v26.css",r.ok]),
fetch("assets/js/v26.js",{cache:"no-store"}).then(r=>["v26.js",r.ok]),
fetch("assets/js/nimo-native-fluid.js",{cache:"no-store"}).then(r=>["nimo-native-fluid.js",r.ok]),
fetch("index.html",{cache:"no-store"}).then(r=>["index.html",r.ok])
]).then(res=>status.textContent=res.map(([n,ok])=>`${ok?"OK":"ERRO"} — ${n}`).join("\n"));
</script>
</body>
</html>
